<section class="catalog-container">
  <h2 class="section-title">Featured Couture Dresses</h2>

  <div class="catalog-grid">
  @for (dress of dresses(); track dress.id) {
    <app-ui-product-card
      [product]="dress"
      (click)="navigateToProduct(dress.id)">
    </app-ui-product-card>
  }
</div>
</section>
