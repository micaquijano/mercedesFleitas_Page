<div class="fullpage-editorial-slider-container">
  @for (section of editorialSections(); track section.id; let i = $index) {
    <section class="editorial-vertical-section"
             [class.section-visible]="currentEditorialSectionIndex() === i"
             [style.background-image]="'linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.6)), url(' + section.imageUrl + ')'">

      <!-- Línea sofisticada de progreso (Solo se anima en la sección visible) -->
      <div class="section-progress-bar"></div>

      <div class="vertical-section-overlay-content">
        <span class="collection-label">Atelier Mercedes Fleitas</span>
        <h2 class="editorial-main-title">{{ section.title }}</h2>
        <button class="editorial-action-btn" (click)="openCollectionInNewTab(section.id)">
          Ver Colección
        </button>
      </div>

      <!-- Al hacer click manual, reinicia el contador de tiempo -->
      <div class="vertical-scroll-navigation" (click)="onManualNavigation()" aria-label="Siguiente Sección">
        <span class="navigation-arrow- bounce-animation"></span>
      </div>
    </section>
  }
</div>
